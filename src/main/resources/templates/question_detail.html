<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
th:replace="~{layout :: layout(~{::section})}">

<section class="container my-3">
	<h2 class="border-bottom py-2" th:text="${question.subject}"></h2>
	<div class="card my-3">
		<div class="card-body">
			<div class="card-text" style="white-space: pre-line;" th:text="${question.content}"></div>
			<div class="d-flex justify-content-end">
				<div class="badge bg-light text-dark p-2 text-start">
					<div th:text="${#temporals.format(question.createDate, 'yyyy-MM-dd HH:mm')}"></div>
				</div>
			</div>
		</div>
	</div>

	<div class="my-3">
		<a th:href="@{|/question/modify/${question.id}|}" class="btn btn-warning">수정</a>
		<a th:href="@{|/question/delete/${question.id}|}" class="btn btn-danger"
			onclick="return confirm('정말 삭제하시겠습니까?');">삭제</a>
		<a th:href="@{/question/list}" class="btn btn-secondary">목록</a>
	</div>

	<!-- 답변 목록 -->
	<h5 class="border-bottom py-2" th:text="|${#lists.size(question.answerList)}개의 답변이 있습니다.|"></h5>
	<div class="card my-3" th:each="answer : ${question.answerList}">
		<div class="card-body">
			<div class="card-text" style="white-space: pre-line;" th:text="${answer.content}"></div>
			<div class="d-flex justify-content-end">
				<div class="badge bg-light text-dark p-2 text-start">
					<div th:text="${#temporals.format(answer.createDate, 'yyyy-MM-dd HH:mm')}"></div>
				</div>
			</div>
		</div>
	</div>

	<!-- 답변 등록 -->
	<form th:action="@{|/answer/create/${question.id}|}" method="post" class="my-3">
		<div class="mb-3">
			<label for="content" class="form-label">답변 내용</label>
			<textarea name="content" id="content" class="form-control" rows="5"></textarea>
		</div>
		<input type="submit" value="답변 등록" class="btn btn-primary my-2">
	</form>

</section>

</html>
