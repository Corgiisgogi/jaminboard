<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
th:replace="~{layout :: layout(~{::section})}">

<section class="container my-3">
	<h2 class="border-bottom py-2">질문 수정</h2>
	<form th:action="@{|/question/modify/${question.id}|}" method="post">
		<div class="mb-3">
			<label for="subject" class="form-label">제목</label>
			<input type="text" name="subject" id="subject" class="form-control" th:value="${question.subject}">
		</div>

		<div class="mb-3">
			<label for="content" class="form-label">내용</label>
			<textarea name="content" id="content" class="form-control" rows="10" th:text="${question.content}"></textarea>
		</div>

		<input type="submit" value="수정하기" class="btn btn-primary my-2">
		<a th:href="@{|/question/detail/${question.id}|}" class="btn btn-secondary my-2">취소</a>
	</form>

</section>

</html>
